---

image:
  repository: traefik
  tag: v3.3.3
  pullPolicy: IfNotPresent
 
deployment:
  enabled: true
  kind: Deployment
  replicas: 1
  hostAliases:
  - ip: "127.0.0.1" # this is an example
    hostnames:
     - "example.com"
  - ip: "172.1.40.61"
    hostnames:
      - "traefik-dashboard.example.com"
                                        

globalArguments:
- "--global.checknewversion=false"
- "--global.sendanonymoususage=false"

logs:
  general:
    level: DEBUG
  access:
    enabled: false

providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true

entryPoints:
  traefik:
    port: 8080
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: :443
    http:
      middlewares:
        - auth@file
        - strip@file
      tls:
        options: foobar
        domains:
          - main: "example.com"
            sans:
              - "*.example.com"
  ssh-netconf:
    address: ":4334"
  tls-netconf:
    address: ":4335"
  ping: 
    address: ":8082"

ping:
  entryPoint: "ping"
 
serversTransport:
  insecureSkipVerify: true

api:
  insecure: true
  dashboard: true
  debug: true

readinessProbe:
  failureThreshold: 3
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 10

livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 10

ingressRoute:
  dashboard:
    enabled: true
    # Custom match rule with host domain
    matchRule: Host(`localhost`)
    entryPoints: ["websecure"]
    # Add custom middlewares : authentication and redirection
    middlewares:
      - name: traefik-dashboard-auth
    services:
      - name: api@internal
        kind: TraefikService
    entryPoints: ["traefik"]

extraObjects:
  # Basic Authentication Middleware
  - apiVersion: v1
    kind: Secret
    metadata:
      name: traefik-dashboard-auth-secret
    type: kubernetes.io/basic-auth
    stringData:
      username: admin
      password: changeme

  - apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      name: traefik-dashboard-auth
      namespace: traefik  # Ensure this matches your desired namespace
    spec:
      basicAuth:
        secret: traefik-dashboard-auth-secret

  # Strip Prefix Middleware
  - apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      name: strip
      namespace: traefik
    spec:
      stripPrefix:
        prefixes:
          - /traefik


