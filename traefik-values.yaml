---

image:
  repository: traefik
  tag: v2.9.6
  pullPolicy: IfNotPresent
 
deployment:
  enabled: true
  kind: Deployment
  replicas: 1
  healthcheckScheme: HTTP
  readinessPath: /ping
  livenessPath: /ping

globalArguments:
- "--global.checknewversion=false"
- "--global.sendanonymoususage=false"

logs:
  general:
    level: DEBUG
  access:
    enabled: false

providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true

ports:
  traefik:
    port: 8080
    protocol: TCP
    expose: false
    exposedPort: 8080
    nodePort: 30808   # Optionally specify the NodePort value here if needed
  web:
    port: 80
    protocol: TCP
    expose: true
    exposedPort: 80
    redirections:
      entryPoint:
        to: websecure
        scheme: https
        permanent: true
    nodePort: 30080   # Optionally specify the NodePort value here if needed
  websecure:
    port: 443
    protocol: TCP
    expose: true
    exposedPort: 443
    tls:
      enabled: true
      options: ""
      certResolver: ""
      domains:
        - main: "gateway.virtual33.myguest.virtualbox.org"
          sans:
            - "*.virtual33.myguest.virtualbox.org"
    nodePort: 30443   # Optionally specify the NodePort value here if needed
  ssh-netconf:
    port: 4334
    protocol: TCP
    expose: true
    exposedPort: 4334
  tls-netconf:
    port: 4335
    protocol: TCP
    expose: true
    exposedPort: 4335
 

api:
  insecure: true
  dashboard: true
  debug: true

readinessProbe:
  failureThreshold: 3
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 10

livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 10

ingressRoute:
  dashboard:
    enabled: true
    # Custom match rule with host domain
    matchRule: Host(`gateway.virtual33.myguest.virtualbox.org`)
    entryPoints: ["websecure"]
    # Add custom middlewares : authentication and redirection
    services:
      - name: api@internal
        kind: TraefikService
  healthcheck:
    enabled: true
    matchRule: PathPrefix(`/ping`)
    services:
      - name: ping@internal
        kind: TraefikService
    entryPoints: ["traefik"]
    middlewares: []

extraObjects:

  # Strip Prefix Middleware
  - apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      name: strip
      namespace: traefik
    spec:
      stripPrefix:
        prefixes:
          - /traefik

service:
  enabled: true
  type: NodePort  # Change from LoadBalancer to NodePort
  single: true
